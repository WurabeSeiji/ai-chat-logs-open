<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>4次元光円錐 3D</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a12; color: #e0e0e0;
    font-family: monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 8px; overflow-x: hidden;
  }
  h1 { font-size: 1.0rem; color: #4fc3f7; margin-bottom: 4px; text-align: center; }
  p.sub { font-size: 0.68rem; color: #888; margin-bottom: 10px; text-align: center; line-height: 1.7; }
  canvas { display: block; width: 100%; touch-action: none; }
  .controls {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px 12px; width: 100%; max-width: 500px;
    margin-bottom: 10px;
  }
  .ctrl { display: flex; flex-direction: column; font-size: 0.68rem; color: #aaa; }
  .val { color: #4fc3f7; font-weight: bold; }
  input[type=range] { width: 100%; accent-color: #4fc3f7; }
  .legend {
    width: 100%; max-width: 500px;
    font-size: 0.68rem; line-height: 2.0;
    background: #0f1020; border: 1px solid #2a2d4a;
    padding: 8px 12px; margin-top: 8px;
  }
  .leg { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .lc { width: 24px; height: 3px; flex-shrink: 0; }
</style>
</head>
<body>
<h1>4次元光円錐の3D投影</h1>
<p class="sub">
  空間3軸 (x,y,z)、時間軸 t（c=1）<br>
  t = a の断面 → 半径 a の球体 S²<br>
  x² + y² + z² = t²
</p>

<div class="controls">
  <div class="ctrl">
    <label>時間範囲 t = <span class="val" id="Tval">2.0</span></label>
    <input type="range" id="Tslider" min="0.5" max="3.0" step="0.1" value="2.0">
  </div>
  <div class="ctrl">
    <label>断面数 <span class="val" id="Nval">5</span></label>
    <input type="range" id="Nslider" min="2" max="10" step="1" value="5">
  </div>
  <div class="ctrl">
    <label>仰角 <span class="val" id="Eval">20</span>°</label>
    <input type="range" id="Eslider" min="-80" max="80" step="1" value="20">
  </div>
  <div class="ctrl">
    <label>方位角 <span class="val" id="Aval">30</span>°</label>
    <input type="range" id="Aslider" min="0" max="360" step="1" value="30">
  </div>
</div>

<canvas id="c"></canvas>

<div class="legend">
  <div class="leg"><div class="lc" style="background:#4fc3f7"></div>t=a の球体断面 S²（半径=a）</div>
  <div class="leg"><div class="lc" style="background:#ffeb3b"></div>未来光円錐の母線（光の軌跡）</div>
  <div class="leg"><div class="lc" style="background:#ff9800"></div>過去光円錐の母線</div>
  <div class="leg"><div class="lc" style="background:#aaaaaa"></div>時間軸 t</div>
  <div class="leg"><div class="lc" style="background:#ef5350"></div>現在（t=0）</div>
</div>

<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H, scale;
var tMax=2.0, N=5, elev=20, azim=30;

// ドラッグ回転
var dragging=false, lastX=0, lastY=0;
canvas.addEventListener('mousedown',  function(e){ dragging=true; lastX=e.clientX; lastY=e.clientY; });
canvas.addEventListener('mousemove',  function(e){ if(!dragging)return; azim+=(e.clientX-lastX)*0.5; elev-=(e.clientY-lastY)*0.5; elev=Math.max(-80,Math.min(80,elev)); lastX=e.clientX; lastY=e.clientY; syncSliders(); draw(); });
canvas.addEventListener('mouseup',    function(){ dragging=false; });
canvas.addEventListener('touchstart', function(e){ dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; e.preventDefault(); },{passive:false});
canvas.addEventListener('touchmove',  function(e){ if(!dragging)return; azim+=(e.touches[0].clientX-lastX)*0.5; elev-=(e.touches[0].clientY-lastY)*0.5; elev=Math.max(-80,Math.min(80,elev)); lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; syncSliders(); draw(); e.preventDefault(); },{passive:false});
canvas.addEventListener('touchend',   function(){ dragging=false; });

function syncSliders(){
  document.getElementById('Aslider').value=((azim%360)+360)%360;
  document.getElementById('Eslider').value=elev;
  document.getElementById('Aval').textContent=Math.round(((azim%360)+360)%360);
  document.getElementById('Eval').textContent=Math.round(elev);
}

function resizeCanvas(){
  var w=Math.min(window.innerWidth,document.body.clientWidth)-16;
  canvas.width=w; canvas.height=Math.round(w*0.95);
  W=canvas.width; H=canvas.height; scale=W/8;
}
window.addEventListener('resize',function(){ resizeCanvas(); draw(); });

// 3D→2D 透視投影
// 画面座標系: x=右, y=上, z=奥行き（視点方向）
// 3D空間: X=空間x, Y=時間t（上方向）, Z=空間z
function project(X, Y, Z) {
  var a = azim*Math.PI/180;
  var e = elev*Math.PI/180;
  // 方位角（Y軸まわり）
  var X1 =  X*Math.cos(a) + Z*Math.sin(a);
  var Z1 = -X*Math.sin(a) + Z*Math.cos(a);
  var Y1 = Y;
  // 仰角（X軸まわり）
  var X2 = X1;
  var Y2 = Y1*Math.cos(e) - Z1*Math.sin(e);
  var Z2 = Y1*Math.sin(e) + Z1*Math.cos(e);
  // 透視投影
  var fov=5.0, pz=fov+Z2;
  if(pz<0.1)pz=0.1;
  return { sx: W/2+X2*scale*fov/pz, sy: H/2-Y2*scale*fov/pz, depth:Z2 };
}

function line3D(X1,Y1,Z1,X2,Y2,Z2,col,lw,alpha){
  var p1=project(X1,Y1,Z1), p2=project(X2,Y2,Z2);
  ctx.strokeStyle=col; ctx.lineWidth=lw||1; ctx.globalAlpha=alpha||1;
  ctx.beginPath(); ctx.moveTo(p1.sx,p1.sy); ctx.lineTo(p2.sx,p2.sy); ctx.stroke();
  ctx.globalAlpha=1;
}

// 球体をワイヤーフレームで描く（中心(0,t,0)、半径r）
function drawSphere(t, r, colLat, colLon, alpha){
  var STEPS=32;
  var nLat=6, nLon=8;

  // 緯度線（水平円）
  for(var li=0; li<=nLat; li++){
    var phi=-Math.PI/2 + li*Math.PI/nLat;  // -90° to +90°
    var ry=r*Math.sin(phi);   // y成分（上下）
    var rr=r*Math.cos(phi);   // 水平半径
    ctx.strokeStyle=colLat; ctx.lineWidth=li===nLat/2?1.5:0.7; ctx.globalAlpha=alpha;
    ctx.beginPath();
    var first=true;
    for(var si=0;si<=STEPS;si++){
      var th=si*2*Math.PI/STEPS;
      var p=project(rr*Math.cos(th), t+ry, rr*Math.sin(th));
      if(first){ctx.moveTo(p.sx,p.sy);first=false;}
      else ctx.lineTo(p.sx,p.sy);
    }
    ctx.closePath(); ctx.stroke(); ctx.globalAlpha=1;
  }

  // 経度線（縦円）
  for(var lo=0; lo<nLon; lo++){
    var th2=lo*2*Math.PI/nLon;
    ctx.strokeStyle=colLon; ctx.lineWidth=0.7; ctx.globalAlpha=alpha*0.7;
    ctx.beginPath();
    var first2=true;
    for(var si2=0;si2<=STEPS;si2++){
      var phi2=-Math.PI/2+si2*Math.PI/STEPS;
      var px2=r*Math.cos(phi2)*Math.cos(th2);
      var py2=r*Math.sin(phi2);
      var pz2=r*Math.cos(phi2)*Math.sin(th2);
      var p2=project(px2, t+py2, pz2);
      if(first2){ctx.moveTo(p2.sx,p2.sy);first2=false;}
      else ctx.lineTo(p2.sx,p2.sy);
    }
    ctx.stroke(); ctx.globalAlpha=1;
  }
}

function draw(){
  resizeCanvas();
  tMax=parseFloat(document.getElementById('Tslider').value);
  N   =parseInt(document.getElementById('Nslider').value);
  elev=parseFloat(document.getElementById('Eslider').value);
  azim=parseFloat(document.getElementById('Aslider').value);
  document.getElementById('Tval').textContent=tMax.toFixed(1);
  document.getElementById('Nval').textContent=N;
  document.getElementById('Eval').textContent=Math.round(elev);
  document.getElementById('Aval').textContent=Math.round(azim);

  ctx.fillStyle='#0a0a12';
  ctx.fillRect(0,0,W,H);

  var STEPS=48, nLines=16;

  // ── 座標軸 ──
  line3D(-tMax*1.1,0,0, tMax*1.1,0,0, '#ff444466',1,0.5); // x
  line3D(0,0,-tMax*1.1, 0,0,tMax*1.1, '#44ff4466',1,0.5); // z
  line3D(0,-tMax*1.3,0, 0,tMax*1.3,0, '#cccccc',1.5,0.9); // t（時間=上）

  // 軸ラベル
  var px=project(tMax*1.2,0,0); ctx.fillStyle='#ff6666'; ctx.font='11px monospace'; ctx.textAlign='left'; ctx.fillText('x',px.sx,px.sy);
  var pz=project(0,0,tMax*1.2); ctx.fillStyle='#66ff66'; ctx.fillText('z',pz.sx,pz.sy);
  var pt=project(0,tMax*1.35,0); ctx.fillStyle='#dddddd'; ctx.fillText('t 未来',pt.sx,pt.sy);
  var ptn=project(0,-tMax*1.35,0); ctx.fillStyle='#888888'; ctx.fillText('t 過去',ptn.sx,ptn.sy);

  // ── 光円錐の母線 ──
  // x²+y²+z²=t² → 母線は原点から各方向へ
  for(var i=0;i<nLines;i++){
    var phi =i*2*Math.PI/nLines;
    var theta=Math.PI/4;  // 光円錐の開き角 45°
    var lx=Math.sin(theta)*Math.cos(phi);
    var lz=Math.sin(theta)*Math.sin(phi);
    var ly=Math.cos(theta);
    // 未来
    line3D(0,0,0, lx*tMax,ly*tMax,lz*tMax, '#ffeb3b', 0.8, 0.5);
    // 過去
    line3D(0,0,0, lx*tMax,-ly*tMax,lz*tMax, '#ff9800', 0.8, 0.5);
  }

  // ── t=a の球体断面 S²（未来）──
  for(var ni=1;ni<=N;ni++){
    var t=ni*tMax/N;
    var alpha=0.3+0.5*(ni/N);
    drawSphere(t, t, '#4fc3f7', '#2196f3', alpha);
  }

  // ── t=a の球体断面 S²（過去）──
  for(var ni2=1;ni2<=N;ni2++){
    var t2=ni2*tMax/N;
    var alpha2=0.2+0.3*(ni2/N);
    drawSphere(-t2, t2, '#ff9800', '#ff5722', alpha2);
  }

  // ── 現在（t=0）の点 ──
  var po=project(0,0,0);
  ctx.fillStyle='#ef5350';
  ctx.beginPath(); ctx.arc(po.sx,po.sy,6,0,2*Math.PI); ctx.fill();
  ctx.fillStyle='#ef5350'; ctx.font='bold 11px monospace';
  ctx.fillText('現在 t=0',po.sx+8,po.sy);

  // ── 情報 ──
  ctx.fillStyle='#4fc3f7'; ctx.font='bold 11px monospace'; ctx.textAlign='left';
  ctx.fillText('x²+y²+z²= t²  (4次元光円錐)', 10, 20);
  ctx.fillStyle='#aaa'; ctx.font='10px monospace';
  ctx.fillText('t=a での断面: 半径aの球体 S²', 10, 34);
  ctx.fillText('空間は閉じた球面・時間は開く', 10, 48);
  ctx.fillText('ドラッグで回転', 10, 62);
}

['Tslider','Nslider','Eslider','Aslider'].forEach(function(id){
  document.getElementById(id).addEventListener('input', draw);
});
draw();
</script>
</body>
</html>
