<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280" width="620" height="280">
  <!-- IN circle -->
  <circle cx="50" cy="120" r="30" fill="none" stroke="#000" stroke-width="2"/>
  <text x="50" y="125" text-anchor="middle" font-family="serif" font-size="18">IN</text>

  <!-- Arrow: IN -> FD box -->
  <line x1="80" y1="120" x2="145" y2="120" stroke="#000" stroke-width="2"/>
  <polygon points="145,114 157,120 145,126" fill="#000"/>

  <!-- FD large rectangle -->
  <rect x="160" y="20" width="300" height="200" fill="#f9f9f9" stroke="#000" stroke-width="2" rx="4"/>
  <text x="310" y="48" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" font-style="italic">F<tspan baseline-shift="sub" font-size="12">D</tspan></text>

  <!-- δT box inside -->
  <rect x="185" y="65" width="80" height="40" fill="#fff" stroke="#000" stroke-width="1.5" rx="3"/>
  <text x="225" y="90" text-anchor="middle" font-family="serif" font-size="15">δT</text>
  <text x="225" y="120" text-anchor="middle" font-family="serif" font-size="11" fill="#555">（遅延パラメータ）</text>

  <!-- I box inside -->
  <rect x="340" y="65" width="80" height="40" fill="#fff" stroke="#000" stroke-width="1.5" rx="3"/>
  <text x="380" y="90" text-anchor="middle" font-family="serif" font-size="16" font-style="italic">I</text>
  <text x="380" y="120" text-anchor="middle" font-family="serif" font-size="11" fill="#555">（内部情報）</text>

  <!-- Logic description inside FD -->
  <text x="185" y="155" font-family="serif" font-size="12" fill="#333">IN ≠ I または I = null のとき：</text>
  <text x="195" y="175" font-family="serif" font-size="12" fill="#333">① I ← IN（コピー）</text>
  <text x="195" y="195" font-family="serif" font-size="12" fill="#333">② δT 遅延後 OUT ← I（出力）</text>

  <!-- Arrow: FD box -> OUT -->
  <line x1="460" y1="120" x2="525" y2="120" stroke="#000" stroke-width="2"/>
  <polygon points="525,114 537,120 525,126" fill="#000"/>

  <!-- OUT circle -->
  <circle cx="570" cy="120" r="30" fill="none" stroke="#000" stroke-width="2"/>
  <text x="570" y="125" text-anchor="middle" font-family="serif" font-size="18">OUT</text>

  <!-- Labels below -->
  <text x="50" y="260" text-anchor="middle" font-family="serif" font-size="13">（入力点）</text>
  <text x="310" y="260" text-anchor="middle" font-family="serif" font-size="13">（ディレイ回路）</text>
  <text x="570" y="260" text-anchor="middle" font-family="serif" font-size="13">（出力点）</text>
</svg>
