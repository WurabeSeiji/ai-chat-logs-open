<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 260" width="620" height="260">
  <!-- IN circle -->
  <circle cx="50" cy="110" r="30" fill="none" stroke="#000" stroke-width="2"/>
  <text x="50" y="115" text-anchor="middle" font-family="serif" font-size="18">IN</text>

  <!-- Arrow: IN -> FD box -->
  <line x1="80" y1="110" x2="145" y2="110" stroke="#000" stroke-width="2"/>
  <polygon points="145,104 157,110 145,116" fill="#000"/>

  <!-- FD large rectangle -->
  <rect x="160" y="20" width="300" height="180" fill="#f9f9f9" stroke="#000" stroke-width="2" rx="4"/>
  <text x="310" y="48" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" font-style="italic">F<tspan baseline-shift="sub" font-size="12">D</tspan></text>

  <!-- I box inside -->
  <rect x="265" y="60" width="80" height="40" fill="#fff" stroke="#000" stroke-width="1.5" rx="3"/>
  <text x="305" y="85" text-anchor="middle" font-family="serif" font-size="16" font-style="italic">I</text>
  <text x="305" y="115" text-anchor="middle" font-family="serif" font-size="11" fill="#555">（内部情報）</text>

  <!-- Logic description inside FD -->
  <text x="185" y="145" font-family="serif" font-size="12" fill="#333">IN ≠ I または I = null のとき：</text>
  <text x="195" y="165" font-family="serif" font-size="12" fill="#333">① I ← IN（コピー）</text>
  <text x="195" y="185" font-family="serif" font-size="12" fill="#333">② 1ステップ後 OUT ← I（出力）</text>

  <!-- Arrow: FD box -> OUT -->
  <line x1="460" y1="110" x2="525" y2="110" stroke="#000" stroke-width="2"/>
  <polygon points="525,104 537,110 525,116" fill="#000"/>

  <!-- OUT circle -->
  <circle cx="570" cy="110" r="30" fill="none" stroke="#000" stroke-width="2"/>
  <text x="570" y="115" text-anchor="middle" font-family="serif" font-size="18">OUT</text>

  <!-- Labels below -->
  <text x="50" y="240" text-anchor="middle" font-family="serif" font-size="13">（入力点）</text>
  <text x="310" y="240" text-anchor="middle" font-family="serif" font-size="13">（ディレイ回路）</text>
  <text x="570" y="240" text-anchor="middle" font-family="serif" font-size="13">（出力点）</text>
</svg>
