<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <!-- IN circle -->
  <circle cx="70" cy="50" r="30" fill="none" stroke="#000" stroke-width="2"/>
  <text x="70" y="55" text-anchor="middle" font-family="serif" font-size="18">IN</text>
  <text x="70" y="95" text-anchor="middle" font-family="serif" font-size="13">（入力点）</text>

  <!-- Arrow: IN -> FD -->
  <line x1="100" y1="50" x2="185" y2="50" stroke="#000" stroke-width="2"/>
  <polygon points="185,44 197,50 185,56" fill="#000"/>

  <!-- FD rectangle -->
  <rect x="200" y="20" width="100" height="60" fill="none" stroke="#000" stroke-width="2"/>
  <text x="250" y="57" text-anchor="middle" font-family="serif" font-size="20" font-style="italic">F<tspan baseline-shift="sub" font-size="14">D</tspan></text>
  <text x="250" y="105" text-anchor="middle" font-family="serif" font-size="13">（ディレイ回路）</text>

  <!-- Arrow: FD -> OUT -->
  <line x1="300" y1="50" x2="385" y2="50" stroke="#000" stroke-width="2"/>
  <polygon points="385,44 397,50 385,56" fill="#000"/>

  <!-- OUT circle -->
  <circle cx="430" cy="50" r="30" fill="none" stroke="#000" stroke-width="2"/>
  <text x="430" y="55" text-anchor="middle" font-family="serif" font-size="18">OUT</text>
  <text x="430" y="95" text-anchor="middle" font-family="serif" font-size="13">（出力点）</text>
</svg>
