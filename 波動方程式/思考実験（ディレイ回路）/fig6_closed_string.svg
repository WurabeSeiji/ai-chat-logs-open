<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" width="700" height="250">
  <!-- NOT rectangle (top) -->
  <rect x="270" y="20" width="160" height="50" fill="#f9f9f9" stroke="#000" stroke-width="2" rx="4"/>
  <text x="350" y="50" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold">NOT</text>
  <text x="280" y="38" font-family="serif" font-size="10">OUT</text>
  <text x="415" y="38" font-family="serif" font-size="10">IN</text>

  <!-- Connection: FDn OUT -> right -> up -> NOT IN -->
  <circle cx="560" cy="155" r="3" fill="#000"/>
  <line x1="560" y1="155" x2="630" y2="155" stroke="#000" stroke-width="2"/>
  <line x1="630" y1="155" x2="630" y2="45" stroke="#000" stroke-width="2"/>
  <line x1="630" y1="45" x2="438" y2="45" stroke="#000" stroke-width="2"/>
  <polygon points="438,39 426,45 438,51" fill="#000"/>

  <!-- Connection: NOT OUT -> left -> down -> FD1 IN -->
  <circle cx="270" cy="45" r="3" fill="#000"/>
  <line x1="270" y1="45" x2="50" y2="45" stroke="#000" stroke-width="2"/>
  <line x1="50" y1="45" x2="50" y2="155" stroke="#000" stroke-width="2"/>
  <line x1="50" y1="155" x2="72" y2="155" stroke="#000" stroke-width="2"/>
  <polygon points="72,149 84,155 72,161" fill="#000"/>

  <!-- FD1 rectangle -->
  <rect x="80" y="130" width="90" height="50" fill="#f9f9f9" stroke="#000" stroke-width="2" rx="4"/>
  <text x="125" y="150" text-anchor="middle" font-family="serif" font-size="14" font-style="italic">F<tspan baseline-shift="sub" font-size="10">D1</tspan></text>
  <text x="90" y="127" font-family="serif" font-size="10">IN</text>
  <text x="150" y="127" font-family="serif" font-size="10">OUT</text>

  <!-- Arrow: FD1 -> FD2 -->
  <line x1="170" y1="155" x2="210" y2="155" stroke="#000" stroke-width="2"/>
  <polygon points="210,149 222,155 210,161" fill="#000"/>

  <!-- FD2 rectangle -->
  <rect x="225" y="130" width="90" height="50" fill="#f9f9f9" stroke="#000" stroke-width="2" rx="4"/>
  <text x="270" y="150" text-anchor="middle" font-family="serif" font-size="14" font-style="italic">F<tspan baseline-shift="sub" font-size="10">D2</tspan></text>

  <!-- Arrow: FD2 -> dots -->
  <line x1="315" y1="155" x2="355" y2="155" stroke="#000" stroke-width="2"/>
  <polygon points="355,149 367,155 355,161" fill="#000"/>

  <!-- Dots -->
  <text x="390" y="160" text-anchor="middle" font-family="serif" font-size="20">···</text>

  <!-- Arrow: dots -> FDn -->
  <line x1="415" y1="155" x2="455" y2="155" stroke="#000" stroke-width="2"/>
  <polygon points="455,149 467,155 455,161" fill="#000"/>

  <!-- FDn rectangle -->
  <rect x="470" y="130" width="90" height="50" fill="#f9f9f9" stroke="#000" stroke-width="2" rx="4"/>
  <text x="515" y="150" text-anchor="middle" font-family="serif" font-size="14" font-style="italic">F<tspan baseline-shift="sub" font-size="10">Dn</tspan></text>
  <text x="540" y="127" font-family="serif" font-size="10">OUT</text>

  <!-- Title -->
  <text x="350" y="230" text-anchor="middle" font-family="serif" font-size="14">図6：閉じた縄の情報伝達モデル（負帰還）</text>
</svg>
