<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" width="460" height="320">
  <!-- NOT rectangle (upper) -->
  <rect x="130" y="30" width="200" height="70" fill="#f9f9f9" stroke="#000" stroke-width="2" rx="4"/>
  <text x="230" y="72" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold">NOT</text>

  <!-- NOT labels: OUT on left, IN on right -->
  <text x="145" y="55" font-family="serif" font-size="13">OUT</text>
  <text x="295" y="55" font-family="serif" font-size="13">IN</text>

  <!-- FD rectangle (lower) -->
  <rect x="130" y="200" width="200" height="70" fill="#f9f9f9" stroke="#000" stroke-width="2" rx="4"/>
  <text x="230" y="237" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" font-style="italic">F<tspan baseline-shift="sub" font-size="13">D</tspan></text>
  <text x="230" y="258" text-anchor="middle" font-family="serif" font-size="12" fill="#555">（δT）</text>

  <!-- FD labels: IN on left, OUT on right -->
  <text x="145" y="220" font-family="serif" font-size="13">IN</text>
  <text x="295" y="220" font-family="serif" font-size="13">OUT</text>

  <!-- Connection: FD OUT (right) -> NOT IN (right) -->
  <!-- Right side vertical line -->
  <circle cx="330" cy="235" r="4" fill="#000"/>
  <line x1="330" y1="235" x2="390" y2="235" stroke="#000" stroke-width="2"/>
  <line x1="390" y1="235" x2="390" y2="65" stroke="#000" stroke-width="2"/>
  <line x1="390" y1="65" x2="338" y2="65" stroke="#000" stroke-width="2"/>
  <polygon points="338,59 326,65 338,71" fill="#000"/>

  <!-- Connection: NOT OUT (left) -> FD IN (left) -->
  <!-- Left side vertical line -->
  <circle cx="130" cy="65" r="4" fill="#000"/>
  <line x1="130" y1="65" x2="70" y2="65" stroke="#000" stroke-width="2"/>
  <line x1="70" y1="65" x2="70" y2="235" stroke="#000" stroke-width="2"/>
  <line x1="70" y1="235" x2="122" y2="235" stroke="#000" stroke-width="2"/>
  <polygon points="122,229 134,235 122,241" fill="#000"/>

  <!-- Title -->
  <text x="230" y="310" text-anchor="middle" font-family="serif" font-size="14">図4：単振動回路</text>
</svg>
