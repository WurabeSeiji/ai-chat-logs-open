<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 120" width="780" height="120">
  <!-- IN1 circle -->
  <circle cx="40" cy="50" r="25" fill="none" stroke="#000" stroke-width="2"/>
  <text x="40" y="45" text-anchor="middle" font-family="serif" font-size="13">IN</text>
  <text x="40" y="60" text-anchor="middle" font-family="serif" font-size="11" baseline-shift="sub">1</text>
  <text x="40" y="95" text-anchor="middle" font-family="serif" font-size="11">（左端）</text>

  <!-- Arrow: IN1 -> FD1 -->
  <line x1="65" y1="50" x2="105" y2="50" stroke="#000" stroke-width="2"/>
  <polygon points="105,44 117,50 105,56" fill="#000"/>

  <!-- FD1 rectangle -->
  <rect x="120" y="25" width="90" height="50" fill="#f9f9f9" stroke="#000" stroke-width="2" rx="4"/>
  <text x="165" y="45" text-anchor="middle" font-family="serif" font-size="14" font-style="italic">F<tspan baseline-shift="sub" font-size="10">D1</tspan></text>

  <!-- Arrow: FD1 -> FD2 -->
  <line x1="210" y1="50" x2="250" y2="50" stroke="#000" stroke-width="2"/>
  <polygon points="250,44 262,50 250,56" fill="#000"/>

  <!-- FD2 rectangle -->
  <rect x="265" y="25" width="90" height="50" fill="#f9f9f9" stroke="#000" stroke-width="2" rx="4"/>
  <text x="310" y="45" text-anchor="middle" font-family="serif" font-size="14" font-style="italic">F<tspan baseline-shift="sub" font-size="10">D2</tspan></text>

  <!-- Arrow: FD2 -> dots -->
  <line x1="355" y1="50" x2="395" y2="50" stroke="#000" stroke-width="2"/>
  <polygon points="395,44 407,50 395,56" fill="#000"/>

  <!-- Dots -->
  <text x="430" y="55" text-anchor="middle" font-family="serif" font-size="20">···</text>

  <!-- Arrow: dots -> FDn -->
  <line x1="455" y1="50" x2="495" y2="50" stroke="#000" stroke-width="2"/>
  <polygon points="495,44 507,50 495,56" fill="#000"/>

  <!-- FDn rectangle -->
  <rect x="510" y="25" width="90" height="50" fill="#f9f9f9" stroke="#000" stroke-width="2" rx="4"/>
  <text x="555" y="45" text-anchor="middle" font-family="serif" font-size="14" font-style="italic">F<tspan baseline-shift="sub" font-size="10">Dn</tspan></text>

  <!-- Arrow: FDn -> OUTn -->
  <line x1="600" y1="50" x2="650" y2="50" stroke="#000" stroke-width="2"/>
  <polygon points="650,44 662,50 650,56" fill="#000"/>

  <!-- OUTn circle -->
  <circle cx="690" cy="50" r="25" fill="none" stroke="#000" stroke-width="2"/>
  <text x="690" y="45" text-anchor="middle" font-family="serif" font-size="13">OUT</text>
  <text x="690" y="60" text-anchor="middle" font-family="serif" font-size="11" baseline-shift="sub">n</text>
  <text x="690" y="95" text-anchor="middle" font-family="serif" font-size="11">（右端）</text>
</svg>
