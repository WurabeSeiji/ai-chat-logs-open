<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 700" width="700" height="700">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="700" fill="#fafafa"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#222">Figure 1: Three-Layer Structure  R–R₁–R₀</text>

  <!-- Origin -->
  <circle cx="80" cy="620" r="5" fill="#222"/>
  <text x="65" y="650" font-family="serif" font-size="18" font-weight="bold" fill="#222">O</text>

  <!-- Axes -->
  <line x1="80" y1="620" x2="680" y2="620" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="620" x2="80" y2="40" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- R-direction arrow (45 degrees) -->
  <line x1="80" y1="620" x2="540" y2="160" stroke="#c0392b" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowhead-red)"/>
  <text x="555" y="155" font-family="serif" font-size="16" font-weight="bold" fill="#c0392b">R</text>
  <text x="548" y="175" font-family="serif" font-size="12" fill="#c0392b">(direction)</text>

  <!-- R arcs (smallest, multiple) - radii ~120-150 -->
  <path d="M 80,500 A 120,120 0 0,1 200,620" fill="none" stroke="#2980b9" stroke-width="1.5" opacity="0.5"/>
  <path d="M 80,488 A 132,132 0 0,1 212,620" fill="none" stroke="#2980b9" stroke-width="1.5" opacity="0.6"/>
  <path d="M 80,476 A 144,144 0 0,1 224,620" fill="none" stroke="#2980b9" stroke-width="1.5" opacity="0.7"/>
  <path d="M 80,466 A 154,154 0 0,1 234,620" fill="none" stroke="#2980b9" stroke-width="1.5" opacity="0.8"/>
  <path d="M 80,458 A 162,162 0 0,1 242,620" fill="none" stroke="#2980b9" stroke-width="1.5" opacity="0.9"/>

  <!-- Dots indicating more R arcs -->
  <circle cx="137" cy="465" r="2" fill="#2980b9"/>
  <circle cx="132" cy="455" r="2" fill="#2980b9"/>
  <circle cx="127" cy="445" r="2" fill="#2980b9"/>

  <!-- R labels -->
  <text x="250" y="610" font-family="serif" font-size="14" fill="#2980b9">R₁</text>
  <text x="252" y="626" font-family="serif" font-size="11" fill="#2980b9">R₂</text>
  <text x="195" y="626" font-family="serif" font-size="11" fill="#2980b9">...</text>
  <text x="175" y="626" font-family="serif" font-size="11" fill="#2980b9">Rₘ</text>

  <!-- R group brace/label -->
  <text x="30" y="490" font-family="serif" font-size="14" font-weight="bold" fill="#2980b9" transform="rotate(-45, 30, 490)">S^n(R)</text>
  <text x="115" y="520" font-family="serif" font-size="12" fill="#2980b9">}</text>

  <!-- R1 arcs (slightly larger, multiple) - radii ~175-220 -->
  <path d="M 80,440 A 180,180 0 0,1 260,620" fill="none" stroke="#27ae60" stroke-width="1.8" opacity="0.5"/>
  <path d="M 80,426 A 194,194 0 0,1 274,620" fill="none" stroke="#27ae60" stroke-width="1.8" opacity="0.6"/>
  <path d="M 80,412 A 208,208 0 0,1 288,620" fill="none" stroke="#27ae60" stroke-width="1.8" opacity="0.7"/>
  <path d="M 80,400 A 220,220 0 0,1 300,620" fill="none" stroke="#27ae60" stroke-width="1.8" opacity="0.8"/>
  <path d="M 80,390 A 230,230 0 0,1 310,620" fill="none" stroke="#27ae60" stroke-width="1.8" opacity="0.9"/>

  <!-- Dots indicating more R1 arcs -->
  <circle cx="160" cy="398" r="2" fill="#27ae60"/>
  <circle cx="155" cy="388" r="2" fill="#27ae60"/>
  <circle cx="150" cy="378" r="2" fill="#27ae60"/>

  <!-- R1 labels -->
  <text x="315" y="610" font-family="serif" font-size="14" fill="#27ae60">R₁₁</text>
  <text x="317" y="626" font-family="serif" font-size="11" fill="#27ae60">R₁₂</text>
  <text x="275" y="626" font-family="serif" font-size="11" fill="#27ae60">...</text>
  <text x="255" y="626" font-family="serif" font-size="11" fill="#27ae60">R₁ₙ</text>

  <!-- R1 group label -->
  <text x="20" y="420" font-family="serif" font-size="14" font-weight="bold" fill="#27ae60" transform="rotate(-45, 20, 420)">S^n(R₁)</text>

  <!-- Gap indicator (wavy/break marks between R1 group and R0) -->
  <text x="190" y="310" font-family="serif" font-size="24" fill="#888">⋮</text>
  <text x="310" y="370" font-family="serif" font-size="24" fill="#888">⋮</text>

  <!-- R0 arc (much larger) - radius ~480 -->
  <path d="M 80,140 A 480,480 0 0,1 560,620" fill="none" stroke="#e67e22" stroke-width="2.5"/>

  <!-- R0 label -->
  <text x="565" y="610" font-family="serif" font-size="16" font-weight="bold" fill="#e67e22">R₀</text>

  <!-- R0 annotation -->
  <text x="420" y="290" font-family="serif" font-size="13" fill="#e67e22">S^n(R₀)</text>
  <text x="400" y="308" font-family="serif" font-size="11" fill="#888">R₀ ≫ R₁ &gt; R</text>

  <!-- Points on 45-degree line showing projection correspondence -->
  <!-- p on R arc -->
  <circle cx="188" cy="512" r="4" fill="#2980b9"/>
  <text x="196" y="508" font-family="serif" font-size="12" fill="#2980b9">p</text>

  <!-- p1 on R1 arc -->
  <circle cx="230" cy="470" r="4" fill="#27ae60"/>
  <text x="238" y="466" font-family="serif" font-size="12" fill="#27ae60">p₁</text>

  <!-- p0 on R0 arc -->
  <circle cx="420" cy="280" r="4" fill="#e67e22"/>
  <text x="405" y="270" font-family="serif" font-size="12" fill="#e67e22">p₀</text>

  <!-- Phi mapping arrows -->
  <line x1="232" y1="467" x2="415" y2="285" stroke="#888" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <text x="340" y="360" font-family="serif" font-size="13" font-style="italic" fill="#555">Φ₁→₀</text>

  <!-- Legend box -->
  <rect x="460" y="400" width="220" height="180" rx="8" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="475" y="425" font-family="serif" font-size="13" font-weight="bold" fill="#333">Legend</text>

  <line x1="475" y1="445" x2="510" y2="445" stroke="#2980b9" stroke-width="2"/>
  <text x="518" y="449" font-family="serif" font-size="12" fill="#333">S^n(R) : general</text>

  <line x1="475" y1="470" x2="510" y2="470" stroke="#27ae60" stroke-width="2"/>
  <text x="518" y="474" font-family="serif" font-size="12" fill="#333">S^n(R₁): particle scale</text>

  <line x1="475" y1="495" x2="510" y2="495" stroke="#e67e22" stroke-width="2.5"/>
  <text x="518" y="499" font-family="serif" font-size="12" fill="#333">S^n(R₀): our spacetime</text>

  <line x1="475" y1="520" x2="510" y2="520" stroke="#c0392b" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="518" y="524" font-family="serif" font-size="12" fill="#333">R direction (⊥ to all S^n)</text>

  <text x="475" y="555" font-family="serif" font-size="11" fill="#888">R, R₁ : infinite instances</text>
  <text x="475" y="572" font-family="serif" font-size="11" fill="#888">R₀ : one (not constrained)</text>

</svg>
